# Welcome to Jekyll!
#
# This config file is meant for settings that affect your entire site, values
# which you are expected to set up once and rarely need to edit after that.

# Basic Site Settings
locale                  : "en-US"
site_theme              : "default"
title                   : "Miguel Valdebenito"
title_separator         : "-"
name                    : &name "Miguel Valdebenito"
description             : &description "PhD Candidate in Data Engineering & Geospatial AI. I develop geospatial machine learning systems for hydrogeological and environmental modeling."
url: "https://Miguev33.github.io"
baseurl                 : "" 
repository: "Miguev33/Miguev33.github.io"

# Site Author
author:
  # Biographic information
  avatar           : "profile.png" # Recuerda subir tu foto a /images/ con este nombre
  name             : "Miguel Valdebenito"
  pronouns         : "he/him"
  bio              : "PhD Candidate at Universidad del Bío-Bío. Geospatial AI & Data Engineering for environmental modeling."
  location         : "Chile"
  employer         : "Universidad del Bío-Bío"
  uri              : 
  email            : "migvaldebenitoch@gmail.com"

  # Academic websites
  googlescholar    : "https://scholar.google.com/citations?user=HXsB_tcAAAAJ"
  orcid            : "https://orcid.org/0009-0008-9117-1281"
  ssrn             : "https://papers.ssrn.com/sol3/cf_dev/AbsByAuth.cfm?per_id=6126566" # Enlace basado en tu preprint

  # Repositories and software development
  github           : "mvaldebenito"

  # Social media
  linkedin         : "https://www.linkedin.com/in/miguelvch/"

# Publication Category
publication_category:
  books:
    title: 'Books'
  manuscripts:
    title: 'Journal Articles'    
  conferences:
    title: 'Conference Papers'

# Site Settings
teaser                  : 
breadcrumbs             : false
words_per_minute         : 160
future                  : true
read_more               : "disabled"
talkmap_link            : false
comments:
  provider               : false

# Analytics
analytics:
  provider               : "false"

# Reading Files
include:
  - .htaccess
  - _pages
  - files
exclude:
  - "*.sublime-project"
  - "*.sublime-workspace"
  - .asset-cache
  - .bundle
  - .github
  - .jekyll-assets-cache
  - .sass-cache
  - Gemfile
  - LICENSE
  - README
  - vendor

# Conversion
markdown: kramdown
highlighter: rouge
lsi: false
excerpt_separator: "\n\n"
incremental: false

# Markdown Processing
kramdown:
  input: GFM
  hard_wrap: false
  auto_ids: true
  footnote_nr: 1
  entity_output: as_char
  toc_levels: 1..6
  smart_quotes: lsquo,rsquo,ldquo,rdquo
  enable_coderay: false

# Collections
collections:
  teaching:
    output: true
    permalink: /:collection/:path/
  publications:
    output: true
    permalink: /:collection/:path/
  portfolio:
    output: true
    permalink: /:collection/:path/
  talks:
    output: true
    permalink: /:collection/:path/

# Defaults
defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      read_time: true
      comments: true
      share: true
      related: true
  - scope:
      path: ""
      type: pages
    values:
      layout: single
      author_profile: true
  - scope:
      path: ""
      type: teaching
    values:
      layout: single
      author_profile: true
  - scope:
      path: ""
      type: publications
    values:
      layout: single
      author_profile: true
  - scope:
      path: ""
      type: talks
    values:
      layout: talk
      author_profile: true

# Sass/SCSS
sass:
  sass_dir: _sass
  style: compressed

# Outputting
permalink: /:categories/:title/
timezone: Etc/UTC

# Plugins
plugins:
  - jekyll-feed
  - jekyll-gist
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-redirect-from
  - jemoji
